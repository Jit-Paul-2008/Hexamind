/**
 * ARIA UX - OpenAPI/Swagger Specification
 * Auto-served at: GET /docs (Swagger UI) or /redoc (ReDoc)
 *
 * Generated with FastAPI's automatic OpenAPI generation
 * This file documents the complete API surface
 */

openapi: 3.0.2
info:
  title: ARIA UX API
  description: |
    Claude-like research assistant with persistent workspace, database backend,
    and collaborative features.
    
    ## Authentication
    
    This API uses JWT (JSON Web Tokens) in the Authorization header:
    ```
    Authorization: Bearer <your_jwt_token>
    ```
    
    Get a token via `/api/auth/login` or `/api/auth/register`
    
    ## Rate Limiting
    
    - Default: 100 requests per minute per user
    - Headers provided: `X-RateLimit-Limit`, `X-RateLimit-Remaining`, `X-RateLimit-Reset`
    
    ## Versioning
    
    - v1: Legacy endpoints (will be deprecated)
    - v2: Current/stable endpoints (recommended)
    
    ## Base URL
    
    - Development: http://localhost:8000
    - Production: https://api.aria.example.com
    
  version: "1.0.0"
  contact:
    name: ARIA Support
    email: support@example.com
  license:
    name: MIT

servers:
  - url: http://localhost:8000
    description: Development
  - url: https://api.aria.example.com
    description: Production

tags:
  - name: Authentication
    description: User registration, login, and password management
  - name: Organizations
    description: Organization and team management
  - name: Projects
    description: Project CRUD operations
  - name: Cases
    description: Case (research topic) CRUD operations
  - name: Runs
    description: Pipeline run execution and results
  - name: Pipeline
    description: ARIA research pipeline execution and streaming
  - name: Quality
    description: Quality metrics and diagnostics
  - name: Models
    description: Model provider status and configuration
  - name: Health
    description: Health checks and operational status

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from /api/auth/login

  schemas:
    # ========================================================================
    # Common Models
    # ========================================================================
    Error:
      type: object
      properties:
        detail:
          type: string
          example: "Resource not found"
        error_code:
          type: string
          example: "RESOURCE_NOT_FOUND"
        timestamp:
          type: string
          format: date-time

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 50
        pages:
          type: integer
          example: 2

    # ========================================================================
    # Authentication
    # ========================================================================
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        is_active:
          type: boolean
        is_verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: "SecurePass123!"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT token
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Seconds until expiry
        user:
          $ref: "#/components/schemas/User"

    # ========================================================================
    # Organizations / Workspace
    # ========================================================================
    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Acme Research Corp"
        slug:
          type: string
          example: "acme-research"
        owner_id:
          type: string
          format: uuid
        member_count:
          type: integer
        created_at:
          type: string
          format: date-time

    CreateOrganizationRequest:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"

    # ========================================================================
    # Projects
    # ========================================================================
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        name:
          type: string
          example: "Q2 Market Analysis"
        description:
          type: string
        case_count:
          type: integer
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        archived_at:
          type: string
          format: date-time
          nullable: true

    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 1000

    # ========================================================================
    # Cases
    # ========================================================================
    Case:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
          example: "Is ARIA viable for healthcare?"
        initial_question:
          type: string
        run_count:
          type: integer
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCaseRequest:
      type: object
      required:
        - name
        - initial_question
        - project_id
      properties:
        name:
          type: string
        initial_question:
          type: string
        project_id:
          type: string
          format: uuid

    # ========================================================================
    # Runs
    # ========================================================================
    Run:
      type: object
      properties:
        id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        session_id:
          type: string
          description: Legacy session ID for compatibility
        mode:
          type: string
          enum: [chat, deep_research, decision_brief, compare, scenario]
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        duration_seconds:
          type: number
        cost:
          type: number
          description: USD cost of this run
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    CreateRunRequest:
      type: object
      required:
        - case_id
        - mode
      properties:
        case_id:
          type: string
          format: uuid
        mode:
          type: string
          description: Research mode
          enum: [chat, deep_research, decision_brief, compare, scenario]
        config:
          type: object
          description: Mode-specific configuration

    # ========================================================================
    # Pipeline
    # ========================================================================
    PipelineStartRequest:
      type: object
      required:
        - question
      properties:
        question:
          type: string
          example: "Why is AI important in healthcare?"
        mode:
          type: string
          enum: [deep_research, decision_brief, compare]
          default: deep_research
        context:
          type: object
          description: Optional context/constraints

    PipelineStreamEvent:
      oneOf:
        - type: object
          properties:
            event_type:
              type: string
              enum: [agent_start]
            agent_role:
              type: string
              enum: [advocate, skeptic, synthesiser, oracle]
            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            event_type:
              type: string
              enum: [agent_output]
            agent_role:
              type: string
            output:
              type: string
              description: Streaming text chunk
            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            event_type:
              type: string
              enum: [source_added]
            url:
              type: string
            title:
              type: string
            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            event_type:
              type: string
              enum: [pipeline_complete]
            final_answer:
              type: string
            total_cost:
              type: number
            timestamp:
              type: string
              format: date-time

    PipelineQualityReport:
      type: object
      properties:
        run_id:
          type: string
          format: uuid
        trust_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        trust_grade:
          type: string
          enum: [A, B, C, D, F]
        evidence_coverage:
          type: number
          format: float
          minimum: 0
          maximum: 1
        contradiction_count:
          type: integer
        contradictions:
          type: array
          items:
            type: object
            properties:
              statement_a:
                type: string
              statement_b:
                type: string
              severity:
                type: string
                enum: [low, medium, high]

    # ========================================================================
    # Models
    # ========================================================================
    ModelStatus:
      type: object
      properties:
        provider:
          type: string
          example: "gemini-2.0-flash"
        status:
          type: string
          enum: [healthy, degraded, down]
        last_checked_at:
          type: string
          format: date-time
        cost_per_input_token:
          type: number
        cost_per_output_token:
          type: number

    # ========================================================================
    # Health
    # ========================================================================
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, down]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              status:
                type: string
              message:
                type: string

paths:
  # ============================================================================
  # AUTHENTICATION
  # ============================================================================
  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input
        "409":
          description: Email already registered

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Login and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid credentials
        "404":
          description: User not found

  /api/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # ============================================================================
  # ORGANIZATIONS
  # ============================================================================
  /api/v2/organizations:
    get:
      tags:
        - Organizations
      summary: List organizations
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organization"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      tags:
        - Organizations
      summary: Create organization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "409":
          description: Slug already exists

  # ============================================================================
  # PROJECTS
  # ============================================================================
  /api/v2/projects:
    get:
      tags:
        - Projects
      summary: List projects
      security:
        - bearerAuth: []
      parameters:
        - name: org_id
          in: query
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      tags:
        - Projects
      summary: Create project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  # ============================================================================
  # CASES
  # ============================================================================
  /api/v2/cases:
    get:
      tags:
        - Cases
      summary: List cases
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Case"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      tags:
        - Cases
      summary: Create case
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseRequest"
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"

  # ============================================================================
  # RUNS
  # ============================================================================
  /api/v2/runs:
    get:
      tags:
        - Runs
      summary: List runs
      security:
        - bearerAuth: []
      parameters:
        - name: case_id
          in: query
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: List of runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Run"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

    post:
      tags:
        - Runs
      summary: Create run
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRunRequest"
      responses:
        "201":
          description: Run created and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"

  # ============================================================================
  # PIPELINE
  # ============================================================================
  /api/pipeline/start:
    post:
      tags:
        - Pipeline
      summary: Start ARIA pipeline
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineStartRequest"
      responses:
        "200":
          description: Pipeline started
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                  status:
                    type: string

  /api/pipeline/{sessionId}/stream:
    get:
      tags:
        - Pipeline
      summary: Stream pipeline events
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Streaming events
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream
        "404":
          description: Session not found

  /api/pipeline/{sessionId}/quality:
    get:
      tags:
        - Quality
      summary: Get quality report
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quality report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineQualityReport"
        "404":
          description: Session not found

  # ============================================================================
  # MODELS
  # ============================================================================
  /api/models/status:
    get:
      tags:
        - Models
      summary: Get available models and their status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Model status
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      $ref: "#/components/schemas/ModelStatus"

  # ============================================================================
  # HEALTH
  # ============================================================================
  /health:
    get:
      tags:
        - Health
      summary: System health check
      responses:
        "200":
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  timestamp:
                    type: string
                    format: date-time

  /health/liveness:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Returns 200 if service is alive and can restart
      responses:
        "200":
          description: Service is alive

  /health/readiness:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Returns 200 if service is ready to receive traffic
      responses:
        "200":
          description: Service is ready
        "503":
          description: Service not ready (missing dependency)

  /metrics:
    get:
      tags:
        - Health
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus format metrics
          content:
            text/plain: {}
