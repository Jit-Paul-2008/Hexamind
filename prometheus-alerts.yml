groups:
  - name: aria_application
    interval: 15s
    rules:
      # ========================================================================
      # Error Rate Alerts
      # ========================================================================
      - alert: HighErrorRate
        expr: |
          (sum(rate(hexamind_http_requests_total{status=~"5.."}[5m])) /
           sum(rate(hexamind_http_requests_total[5m]))) > 0.05
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate detected"
          description: |
            Error rate is {{ $value | humanizePercentage }} over the last 5 minutes
            This exceeds the threshold of 5%

      - alert: MediumErrorRate
        expr: |
          (sum(rate(hexamind_http_requests_total{status=~"5.."}[5m])) /
           sum(rate(hexamind_http_requests_total[5m]))) > 0.02
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Medium error rate detected"
          description: |
            Error rate is {{ $value | humanizePercentage }} over the last 5 minutes
            This exceeds the threshold of 2%

      # ========================================================================
      # Latency Alerts
      # ========================================================================
      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95, 
            sum(rate(hexamind_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 5
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High P95 latency"
          description: |
            P95 latency is {{ $value | humanizeDuration }} over the last 5 minutes
            Threshold is 5s

      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum(rate(hexamind_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 10
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Critical P99 latency"
          description: |
            P99 latency is {{ $value | humanizeDuration }} over the last 5 minutes
            Threshold is 10s

      # ========================================================================
      # Endpoint-Specific Alerts
      # ========================================================================
      - alert: PipelineStreamingLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(hexamind_http_request_duration_seconds_bucket{endpoint="/api/pipeline/stream"}[5m])) by (le)
          ) > 30
        for: 3m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Pipeline streaming endpoint slow"
          description: |
            P95 latency for streaming is {{ $value | humanizeDuration }}
            Threshold is 30s

      - alert: DatabaseQueryTimeout
        expr: |
          sum(rate(hexamind_http_requests_total{endpoint=~"/api/v2/.*", status="504"}[5m])) > 0.1
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Database query timeouts detected"
          description: |
            {{ $value | humanize }} timeouts per second detected at database endpoints

      # ========================================================================
      # Availability Alerts
      # ========================================================================
      - alert: ServiceDown
        expr: |
          up{job="aria-api"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "ARIA API service is down"
          description: "Service has been unreachable for 1 minute"

      - alert: ReadinessCheckFailing
        expr: |
          hexamind_health_readiness_status != 1
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Readiness check failing"
          description: |
            The service is not ready to receive traffic
            Check dependencies (database, Redis, etc.)

      - alert: LivenessCheckFailing
        expr: |
          hexamind_health_liveness_status != 1
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Liveness check failing"
          description: "Service is not responding to liveness probes"

      # ========================================================================
      # Resource Alerts
      # ========================================================================
      - alert: HighMemoryUsage
        expr: |
          container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "High memory usage"
          description: |
            Memory usage is {{ $value | humanizePercentage }}
            Threshold is 80%

      - alert: HighCPUUsage
        expr: |
          rate(container_cpu_usage_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "High CPU usage"
          description: |
            CPU usage is {{ $value | humanizePercentage }}
            Consider scaling up

      - alert: DiskSpaceRunningOut
        expr: |
          (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 10m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Disk space running out"
          description: |
            Less than 10% disk space remaining
            {{ $value | humanizePercentage }} available

      # ========================================================================
      # Database Alerts
      # ========================================================================
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          dbpool_connections_in_use / dbpool_maximum_connections > 0.9
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Database connection pool near limit"
          description: |
            {{ $value | humanizePercentage }} of DB connections in use
            May cause connection timeouts

      - alert: SlowDatabaseQueries
        expr: |
          histogram_quantile(0.95,
            sum(rate(db_query_duration_seconds_bucket[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Slow database queries detected"
          description: |
            P95 query time is {{ $value | humanizeDuration }}
            Threshold is 500ms

      # ========================================================================
      # Cache Alerts
      # ========================================================================
      - alert: LowCacheHitRate
        expr: |
          (sum(rate(redis_cache_hits_total[5m])) /
           (sum(rate(redis_cache_hits_total[5m])) + sum(rate(redis_cache_misses_total[5m])))) < 0.5
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Low cache hit rate"
          description: |
            Cache hit rate is {{ $value | humanizePercentage }}
            Check cache configuration and TTL settings

      - alert: RedisDown
        expr: |
          up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: "Redis cache is down"
          description: "Redis server is unreachable for 1 minute"

      # ========================================================================
      # Authentication & Security Alerts
      # ========================================================================
      - alert: HighAuthFailureRate
        expr: |
          (sum(rate(auth_failures_total[5m]))) > 1
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "High authentication failure rate"
          description: |
            {{ $value | humanize }} auth failures per second detected
            May indicate brute force attempt

      - alert: InvalidTokenDetected
        expr: |
          sum(rate(auth_invalid_tokens_total[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "Invalid tokens being used"
          description: |
            {{ $value | humanize }} invalid tokens per second detected

      # ========================================================================
      # Data Pipeline Alerts
      # ========================================================================
      - alert: PipelineFailureRate
        expr: |
          (sum(rate(aria_pipeline_runs_failed_total[5m])) /
           sum(rate(aria_pipeline_runs_total[5m]))) > 0.1
        for: 5m
        labels:
          severity: critical
          team: product
        annotations:
          summary: "High pipeline failure rate"
          description: |
            Pipeline failure rate is {{ $value | humanizePercentage }}
            More than 10% of runs are failing

      - alert: PipelineSlowExecution
        expr: |
          histogram_quantile(0.95,
            sum(rate(aria_pipeline_duration_seconds_bucket[5m])) by (le)
          ) > 120
        for: 10m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "Pipeline execution too slow"
          description: |
            P95 pipeline execution time is {{ $value | humanizeDuration }}
            Threshold is 2 minutes

      - alert: ModelProviderUnreachable
        expr: |
          aria_model_provider_health{status="down"} == 1
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "{{ $labels.provider }} model provider unreachable"
          description: |
            Cannot reach {{ $labels.provider }} for 3 minutes
            Pipeline execution will fail

      # ========================================================================
      # Deployment & Version Alerts
      # ========================================================================
      - alert: UndeployedChanges
        expr: |
          changes(app_version[1h]) > 0 and 
          changes(app_deployment_timestamp[1h]) == 0
        for: 30m
        labels:
          severity: info
          team: devops
        annotations:
          summary: "Code changes detected, no deployment"
          description: "New code is available but hasn't been deployed"

      - alert: HighErrorRateAfterDeployment
        expr: |
          (changes(app_deployment_timestamp[5m]) > 0) and
          ((sum(rate(hexamind_http_requests_total{status=~"5.."}[5m])) /
            sum(rate(hexamind_http_requests_total[5m]))) > 0.05)
        for: 2m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "Error spike after deployment"
          description: |
            Error rate {{ $value | humanizePercentage }} shortly after deployment
            Consider rolling back

      # ========================================================================
      # Business Metrics Alerts
      # ========================================================================
      - alert: ZeroActiveUsers
        expr: |
          sum(aria_active_users) == 0
        for: 30m
        labels:
          severity: warning
          team: product
        annotations:
          summary: "No active users detected"
          description: "No users have been active in the last 30 minutes"

      - alert: LowDailyActiveUsers
        expr: |
          increase(aria_daily_active_users[1d]) < 10
        for: 1h
        labels:
          severity: info
          team: product
        annotations:
          summary: "Low daily active users"
          description: |
            Only {{ $value | humanize }} active users today
            Check for platform issues or marketing campaign

      # ========================================================================
      # SLA Monitoring
      # ========================================================================
      - record: sla:availability:5m
        expr: |
          (
            count(up{job="aria-api"} == 1) /
            count(up{job="aria-api"})
          ) * 100

      - alert: SLAViolation
        expr: |
          sla:availability:5m < 99
        for: 10m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "SLA Violation - Availability"
          description: |
            Availability is {{ $value | humanize }}%
            SLA target is 99.9%
