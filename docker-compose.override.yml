services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    environment:
      DATABASE_URL: sqlite:///./aria.db
      JWT_SECRET_KEY: ${JWT_SECRET}
      HEXAMIND_MODEL_PROVIDER: ${HEXAMIND_MODEL_PROVIDER:-local}
      HEXAMIND_MODEL_NAME: ${HEXAMIND_MODEL_NAME:-llama3.1:8b}
      HEXAMIND_LOCAL_BASE_URL: ${HEXAMIND_LOCAL_BASE_URL:-http://host.docker.internal:11434/v1}
      HEXAMIND_WEB_RESEARCH: ${HEXAMIND_WEB_RESEARCH:-1}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      HEXAMIND_ENABLE_HF_FALLBACK: ${HEXAMIND_ENABLE_HF_FALLBACK:-true}
      HEXAMIND_ENABLE_OPENROUTER_FALLBACK: ${HEXAMIND_ENABLE_OPENROUTER_FALLBACK:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"

  frontend:
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
