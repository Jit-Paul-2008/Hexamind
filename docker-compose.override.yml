services:
  backend:
    network_mode: host
    environment:
      DATABASE_URL: sqlite:///./aria.db
      JWT_SECRET: ${JWT_SECRET}
      HEXAMIND_MODEL_PROVIDER: ${HEXAMIND_MODEL_PROVIDER:-local}
      HEXAMIND_LOCAL_MODEL_SMALL: ${HEXAMIND_LOCAL_MODEL_SMALL:-llama3.1:8b}
      HEXAMIND_LOCAL_MODEL_MEDIUM: ${HEXAMIND_LOCAL_MODEL_MEDIUM:-llama3.1:8b}
      HEXAMIND_LOCAL_MODEL_LARGE: ${HEXAMIND_LOCAL_MODEL_LARGE:-llama3.1:8b}

  frontend:
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
