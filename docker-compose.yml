services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aria}
      POSTGRES_USER: ${POSTGRES_USER:-aria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aria}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      HEXAMIND_MODEL_PROVIDER: ${HEXAMIND_MODEL_PROVIDER:-deterministic}
      HEXAMIND_MODEL_NAME: ${HEXAMIND_MODEL_NAME:-gemini-1.5-flash}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aria:aria@postgres:5432/aria}
      HEXAMIND_ENABLE_DATABASE_PERSISTENCE: ${HEXAMIND_ENABLE_DATABASE_PERSISTENCE:-1}
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
