services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    environment:
      BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080}
      INSTANCE_NAME: ${SEARXNG_INSTANCE_NAME:-hexamind-searxng}
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://127.0.0.1:8080/search?q=healthcheck&format=json"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aria}
      POSTGRES_USER: ${POSTGRES_USER:-aria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aria}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      HEXAMIND_MODEL_PROVIDER: ${HEXAMIND_MODEL_PROVIDER:-deterministic}
      HEXAMIND_MODEL_NAME: ${HEXAMIND_MODEL_NAME:-gemini-1.5-flash}
      HEXAMIND_RESEARCH_PROVIDER: ${HEXAMIND_RESEARCH_PROVIDER:-searxng}
      HEXAMIND_SEARXNG_BASE_URL: ${HEXAMIND_SEARXNG_BASE_URL:-http://searxng:8080}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aria:aria@postgres:5432/aria}
      HEXAMIND_ENABLE_DATABASE_PERSISTENCE: ${HEXAMIND_ENABLE_DATABASE_PERSISTENCE:-1}
    depends_on:
      - searxng
      - postgres

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
