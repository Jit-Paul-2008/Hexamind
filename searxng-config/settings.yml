# SearXNG settings for Hexamind local deployment
use_default_settings: true

server:
  limiter: false
  secret_key: "hexamind_searxng_secret_key_change_in_prod"
  bind_address: "0.0.0.0"
  port: 8080

search:
  formats:
    - html
    - json

general:
  debug: false
  instance_name: "Hexamind Search"

engines:
  - name: google
    engine: google
    shortcut: g
    weight: 2.0
  - name: bing
    engine: bing
    shortcut: b
    weight: 1.5
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    weight: 1.5
  - name: wikipedia
    engine: wikipedia
    shortcut: w
    weight: 1.0
  - name: arxiv
    engine: arxiv
    shortcut: ar
    weight: 1.2
